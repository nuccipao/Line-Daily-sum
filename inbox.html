<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Line Inbox">
<title>📥 Line Inbox</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap');
  :root {
    --bg:#f7f6f3;--surface:#fff;--border:#e3e2e0;--text:#37352f;--muted:#9b9a97;--faint:#d1cfc9;
    --blue:#2eaadc;--blue-dark:#1a8ab5;
    --red:#ef4444;--yellow:#f59e0b;--green:#22c55e;--purple:#a855f7;
    --font:'IBM Plex Sans Thai','Sarabun',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;}
  .app{max-width:640px;margin:0 auto;padding:20px 16px 100px;}
  .header{text-align:center;margin-bottom:20px;}
  .header h1{font-size:22px;font-weight:700;}
  .header .sub{font-size:13px;color:var(--muted);margin-top:2px;line-height:1.5;}
  .clock{font-size:32px;font-weight:700;color:var(--blue);margin-top:6px;letter-spacing:2px;}
  .sync-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;border-radius:20px;padding:3px 10px;margin-top:6px;border:1px solid;}
  .sync-ok{color:#166534;background:#f0fdf4;border-color:#bbf7d0;}
  .sync-err{color:var(--red);background:#fef2f2;border-color:#fecaca;}
  .sync-load{color:var(--muted);background:#f7f6f3;border-color:var(--border);}
  .reminder{background:#fffbeb;border:1.5px solid #f59e0b;border-radius:12px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:flex-start;gap:10px;}
  .reminder.hidden{display:none;}
  .reminder-icon{font-size:24px;flex-shrink:0;}
  .reminder-text{font-size:14px;color:#92400e;line-height:1.55;}
  .reminder-text strong{display:block;font-size:15px;margin-bottom:2px;}
  .input-card{background:var(--surface);border-radius:14px;border:1px solid var(--border);padding:16px;margin-bottom:14px;}
  .input-label{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
  .input-row{display:flex;gap:8px;align-items:flex-end;}
  textarea#new-msg{flex:1;border:1.5px solid var(--border);border-radius:10px;padding:10px 13px;font-family:var(--font);font-size:14px;color:var(--text);resize:none;outline:none;line-height:1.6;min-height:56px;transition:border 0.15s;background:#fafaf8;}
  textarea#new-msg:focus{border-color:var(--blue);background:#fff;}
  textarea#new-msg::placeholder{color:var(--faint);}
  .add-btn{background:var(--blue);color:white;border:none;border-radius:10px;padding:0 18px;height:56px;font-size:26px;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent;transition:background 0.15s;}
  .add-btn:active{background:var(--blue-dark);}
  .add-btn:disabled{background:var(--faint);cursor:not-allowed;}
  .counter-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .counter{font-size:13px;color:var(--muted);}
  .counter strong{color:var(--text);font-weight:600;}
  .clear-btn{font-size:12px;color:var(--muted);background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:6px;font-family:var(--font);}
  .clear-btn:active{background:#f1f0ef;color:var(--red);}
  .inbox{display:flex;flex-direction:column;gap:8px;margin-bottom:18px;}
  .msg-card{background:var(--surface);border-radius:10px;border:1px solid var(--border);padding:12px 14px;display:flex;align-items:flex-start;gap:10px;animation:slideIn 0.2s ease;}
  @keyframes slideIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
  .msg-num{font-size:11px;color:var(--faint);font-weight:600;flex-shrink:0;padding-top:2px;min-width:18px;}
  .msg-body{flex:1;font-size:14px;line-height:1.65;white-space:pre-wrap;word-break:break-word;}
  .msg-meta{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0;}
  .msg-time{font-size:11px;color:var(--faint);}
  .msg-date{font-size:10px;color:var(--faint);}
  .msg-del{background:none;border:none;color:var(--faint);cursor:pointer;font-size:20px;padding:0;line-height:1;-webkit-tap-highlight-color:transparent;}
  .msg-del:active{color:var(--red);}
  .empty{text-align:center;padding:36px 20px;color:var(--faint);}
  .empty-icon{font-size:40px;margin-bottom:8px;}
  .empty-text{font-size:14px;line-height:1.6;}
  .loading-msgs{text-align:center;padding:28px;color:var(--muted);font-size:14px;}
  .sum-btn{width:100%;padding:16px;background:var(--blue);color:white;border:none;border-radius:12px;font-family:var(--font);font-size:16px;font-weight:600;cursor:pointer;margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:8px;-webkit-tap-highlight-color:transparent;}
  .sum-btn:active{background:var(--blue-dark);}
  .sum-btn:disabled{background:var(--faint);cursor:not-allowed;}
  .result-card{background:var(--surface);border-radius:14px;border:1px solid var(--border);overflow:hidden;margin-bottom:12px;}
  .result-header{padding:13px 16px;background:#f0f9ff;border-bottom:1px solid #bae6fd;display:flex;justify-content:space-between;align-items:center;}
  .result-title{font-size:13px;font-weight:700;color:#0c4a6e;}
  .result-time-label{font-size:11px;color:#7dd3fc;}
  .result-body{padding:14px;}
  .block{border-radius:8px;padding:12px 13px;margin-bottom:8px;border-left:3px solid;}
  .block:last-child{margin-bottom:0;}
  .b-red{background:#fef2f2;border-color:var(--red);}
  .b-yellow{background:#fffbeb;border-color:var(--yellow);}
  .b-green{background:#f0fdf4;border-color:var(--green);}
  .b-gray{background:#f7f6f3;border-color:var(--muted);}
  .b-purple{background:#faf5ff;border-color:var(--purple);}
  .block-head{font-size:12px;font-weight:700;margin-bottom:5px;}
  .block-content{font-size:13.5px;line-height:1.75;white-space:pre-wrap;}
  .loading{text-align:center;padding:28px;color:var(--muted);font-size:14px;}
  .dot-anim::after{content:'';animation:dots 1.2s infinite;}
  @keyframes dots{0%{content:''}33%{content:'.'}66%{content:'..'}100%{content:'...'}}
  .copy-result-btn{width:100%;padding:11px;background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;font-family:var(--font);font-size:13px;color:#0369a1;cursor:pointer;margin-top:8px;}
  .copy-result-btn:active{background:#e0f2fe;}
  .email-info{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:13px;color:#166534;line-height:1.6;}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="clock" id="clock">00:00</div>
    <h1>📥 Line Inbox</h1>
    <div class="sub">ทิ้งข้อความค้างไว้ได้เรื่อยๆ — sync ทุก device</div>
    <div class="sync-badge sync-load" id="sync-badge">⟳ กำลังเชื่อมต่อ...</div>
  </div>

  <div class="email-info">
    📧 <strong>Email จะส่งมาที่ nuccipao@gmail.com</strong><br>
    ทุกวัน 09:00 และ 20:00 อัตโนมัติ — เปิด Email แล้ว copy วางใน Claude.ai ได้เลย
  </div>

  <div class="reminder hidden" id="reminder">
    <div class="reminder-icon" id="reminder-icon">🔔</div>
    <div class="reminder-text">
      <strong id="reminder-title"></strong>
      <span id="reminder-body"></span>
    </div>
  </div>

  <div class="input-card">
    <div class="input-label">📲 วางข้อความจาก Line ที่นี่</div>
    <div class="input-row">
      <textarea id="new-msg" placeholder="Copy จาก Line → วางที่นี่ → กด +" rows="2"></textarea>
      <button class="add-btn" id="add-btn" onclick="addMsg()">+</button>
    </div>
  </div>

  <div class="counter-row">
    <div class="counter">ค้างอยู่: <strong id="count">0</strong> รายการ</div>
    <button class="clear-btn" onclick="clearAll()">🗑 ล้างทั้งหมด</button>
  </div>

  <div class="inbox" id="inbox">
    <div class="loading-msgs">⟳ กำลังโหลด...</div>
  </div>

  <button class="sum-btn" id="sum-btn" onclick="summarize()" disabled>
    📋 Copy Prompt ไปวางใน Claude.ai
  </button>

  <div id="result-area"></div>

</div>
<script>
// URL ใส่ไว้แล้ว ไม่ต้องแก้
const API_URL = 'https://script.google.com/macros/s/AKfycbyUvghsjh_FCln7fQqsbjINzs6Nvo0f7LLheRY4B7HvDtljJMY72LAYDOokeCgIny2Bgw/exec';

let msgs = [];

// ── Clock & Reminder ─────────────────────────
function updateClock(){
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes();
  document.getElementById('clock').textContent = String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
  checkReminder(h, m);
}
setInterval(updateClock, 1000);
updateClock();

function checkReminder(h, m){
  const el = document.getElementById('reminder');
  if((h===20&&m<30)||(h===9&&m<30)){
    if(msgs.length > 0){
      document.getElementById('reminder-icon').textContent = h===9 ? '☀️' : '🌙';
      document.getElementById('reminder-title').textContent = h===9 ? 'Email สรุปเช้าถูกส่งแล้ว!' : 'Email สรุปเย็นถูกส่งแล้ว!';
      document.getElementById('reminder-body').textContent = ' เปิด Gmail → copy ทั้งหมด → วางใน Claude.ai ได้เลยค่ะ';
      el.classList.remove('hidden');
    }
  } else {
    el.classList.add('hidden');
  }
}

// ── Sync Badge ────────────────────────────────
function setBadge(state, text){
  const el = document.getElementById('sync-badge');
  el.className = 'sync-badge ' + state;
  el.textContent = text;
}

// ── API — ใช้ GET ทั้งหมด เพื่อหลีกเลี่ยง CORS ──
async function apiGet(params){
  const url = API_URL + '?' + new URLSearchParams(params).toString();
  const res = await fetch(url, {redirect:'follow'});
  return res.json();
}

// สำหรับ add ใช้ GET พร้อม encode text
async function apiAdd(text, time){
  const params = new URLSearchParams({action:'add', text:text, time:time});
  const url = API_URL + '?' + params.toString();
  const res = await fetch(url, {redirect:'follow'});
  return res.json();
}

// ── Load ──────────────────────────────────────
async function loadMsgs(){
  setBadge('sync-load','⟳ กำลังโหลด...');
  try{
    const data = await apiGet({action:'list'});
    msgs = data.msgs || [];
    render();
    const now = new Date();
    setBadge('sync-ok','✓ ซิงค์แล้ว '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0'));
  } catch(e){
    setBadge('sync-err','⚠️ เชื่อมต่อไม่ได้');
    document.getElementById('inbox').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">เชื่อมต่อไม่ได้<br>ลอง refresh หน้าใหม่</div></div>';
  }
}

// ── Add ───────────────────────────────────────
async function addMsg(){
  const ta = document.getElementById('new-msg');
  const text = ta.value.trim();
  if(!text) return;
  const btn = document.getElementById('add-btn');
  btn.disabled = true; btn.textContent = '...';
  const now = new Date();
  const time = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  try{
    await apiAdd(text, time);
    ta.value = ''; ta.style.height = '';
    await loadMsgs();
  } catch(e){
    alert('บันทึกไม่ได้ ลองใหม่ครับ');
  }
  btn.disabled = false; btn.textContent = '+';
}

async function deleteMsg(id){
  try{ await apiGet({action:'delete', id:id}); await loadMsgs(); }
  catch(e){ alert('ลบไม่ได้ครับ'); }
}

async function clearAll(){
  if(!msgs.length) return;
  if(!confirm('ล้างข้อความทั้ง '+msgs.length+' รายการ?')) return;
  try{
    await apiGet({action:'clear'});
    document.getElementById('result-area').innerHTML = '';
    await loadMsgs();
  } catch(e){ alert('ล้างไม่ได้ครับ'); }
}

// ── Render ────────────────────────────────────
function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function render(){
  const inbox = document.getElementById('inbox');
  document.getElementById('count').textContent = msgs.length;
  document.getElementById('sum-btn').disabled = msgs.length === 0;
  if(!msgs.length){
    inbox.innerHTML = '<div class="empty"><div class="empty-icon">💬</div><div class="empty-text">ยังไม่มีข้อความค้าง<br>Copy จาก Line แล้วกด + ได้เลย</div></div>';
    return;
  }
  inbox.innerHTML = msgs.map(function(m,i){
    return '<div class="msg-card">'+
      '<div class="msg-num">'+(msgs.length-i)+'</div>'+
      '<div class="msg-body">'+escHtml(m.text)+'</div>'+
      '<div class="msg-meta">'+
        '<div class="msg-time">'+(m.time||'')+'</div>'+
        '<div class="msg-date">'+(m.date||'')+'</div>'+
        '<button class="msg-del" onclick="deleteMsg(\''+m.id+'\')">×</button>'+
      '</div></div>';
  }).join('');
}

document.getElementById('new-msg').addEventListener('keydown', function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addMsg();}
});
document.getElementById('new-msg').addEventListener('input', function(){
  this.style.height='auto';
  this.style.height=Math.min(this.scrollHeight,160)+'px';
});

// ── Copy Prompt ────────────────────────────────
function summarize(){
  if(!msgs.length) return;
  const now = new Date();
  const thDays=['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
  const thMonths=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  const dateStr=thDays[now.getDay()]+' '+now.getDate()+' '+thMonths[now.getMonth()];
  const timeStr=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');

  const dump = msgs.slice().reverse().map(function(m,i){
    return '['+(i+1)+'] ('+(m.date||'')+' '+(m.time||'')+') '+m.text;
  }).join('\n\n');

  const prompt =
    'คุณคือ Chief of Staff AI ของ VP Commercial & Revenue บริษัทค่ายเพลง 4 ค่าย 35 วง\n'+
    'วันนี้: '+dateStr+' '+timeStr+' น.\n\n'+
    'ข้อความจาก Line ที่ยังค้างอยู่:\n\n'+dump+'\n\n'+
    'สรุปเป็น Daily Brief:\n\n'+
    '🔴 ต้องดำเนินการวันนี้\n'+
    '🟡 ต้อง Follow Up ใน 3 วัน\n'+
    '❓ ข้อมูลไม่ครบ ต้องถามใคร\n'+
    '💰 Revenue / Deal Flags\n\n'+
    'Rules: ภาษาไทย กระชับ | เรียงจาก urgent มากไปน้อย | หมวดที่ไม่มีข้อมูล เขียน "ไม่มี"';

  navigator.clipboard.writeText(prompt).then(function(){
    const btn = document.getElementById('sum-btn');
    btn.textContent = '✓ Copy แล้ว! เปิด Claude.ai วางได้เลย';
    setTimeout(function(){ btn.textContent = '📋 Copy Prompt ไปวางใน Claude.ai'; }, 3000);
  });
}

// ── Init ──────────────────────────────────────
loadMsgs();
setInterval(function(){ loadMsgs(); }, 30000);
</script>
</body>
</html>
